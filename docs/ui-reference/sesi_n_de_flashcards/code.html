<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LearnFlow - Active Recall</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom depth for flashcard as per brand guidelines */
        .shadow-level-2 {
            box-shadow: 0 10px 20px rgba(0,0,0,0.04);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#370e00",
                        "tertiary-fixed": "#ffdbce",
                        "surface-container-low": "#eff4ff",
                        "secondary-container": "#82f5c1",
                        "background": "#f8f9ff",
                        "surface-container-highest": "#d3e4fe",
                        "on-tertiary-container": "#ffa582",
                        "on-surface": "#0b1c30",
                        "tertiary-fixed-dim": "#ffb599",
                        "surface-bright": "#f8f9ff",
                        "on-secondary-container": "#00714e",
                        "tertiary-container": "#872d00",
                        "on-surface-variant": "#444653",
                        "outline-variant": "#c4c5d5",
                        "surface-variant": "#d3e4fe",
                        "tertiary": "#611e00",
                        "surface-container": "#e5eeff",
                        "outline": "#757684",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "secondary-fixed": "#85f8c4",
                        "primary-fixed": "#dde1ff",
                        "on-tertiary-fixed-variant": "#7f2b00",
                        "primary": "#00288e",
                        "on-primary-container": "#a8b8ff",
                        "on-background": "#0b1c30",
                        "inverse-primary": "#b8c4ff",
                        "on-primary-fixed-variant": "#173bab",
                        "inverse-surface": "#213145",
                        "surface": "#f8f9ff",
                        "primary-container": "#1e40af",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#b8c4ff",
                        "secondary": "#006c4a",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#001453",
                        "secondary-fixed-dim": "#68dba9",
                        "surface-dim": "#cbdbf5",
                        "inverse-on-surface": "#eaf1ff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#005137",
                        "surface-tint": "#3755c3",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#002114"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "32px",
                        "margin-tablet": "40px",
                        "gutter": "16px",
                        "margin-mobile": "20px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.03em", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-sm": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md h-screen flex flex-col overflow-hidden">
<!-- Top Progress Bar (Focused Mode) -->
<header class="w-full px-margin-mobile md:px-margin-tablet py-gutter flex items-center justify-between z-10 relative bg-background">
<div class="flex items-center gap-gutter text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="school">school</span>
<span class="font-label-md text-label-md">Biología Celular</span>
</div>
<div class="flex-1 max-w-[300px] mx-margin-tablet flex items-center gap-base">
<span class="font-label-sm text-label-sm text-outline w-12 text-right">12/50</span>
<div class="flex-1 h-2 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full w-[24%]"></div>
</div>
</div>
<button aria-label="Cerrar sesión de estudio" class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<!-- Main Flashcard Area -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile md:px-margin-tablet pb-section-gap relative">
<!-- Flashcard (Level 2 Elevation) -->
<article class="w-full max-w-[600px] bg-surface-container-lowest rounded-xl shadow-level-2 p-section-gap flex flex-col relative overflow-hidden transition-all duration-300 transform">
<!-- Question Section -->
<div class="flex flex-col items-center text-center pb-section-gap">
<span class="font-label-sm text-label-sm text-outline uppercase tracking-widest mb-gutter">Pregunta</span>
<h2 class="font-headline-md text-headline-md text-on-surface">
                    ¿Cuál es la función principal de las mitocondrias en la célula eucariota?
                </h2>
</div>
<!-- Divider -->
<div class="w-full h-[1px] bg-outline-variant/30 relative">
<div class="absolute -top-[12px] left-1/2 -translate-x-1/2 bg-surface-container-lowest px-2 text-outline-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="autorenew">autorenew</span>
</div>
</div>
<!-- Answer Section (Revealed) -->
<div class="flex flex-col items-center text-center pt-section-gap">
<span class="font-label-sm text-label-sm text-secondary uppercase tracking-widest mb-gutter">Respuesta</span>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                    La producción de energía mediante la síntesis de ATP a través de la respiración celular. A menudo se las describe como las "centrales eléctricas" de la célula.
                </p>
</div>
</article>
<!-- Action Buttons (Bottom Docked on smaller screens, inline on desktop) -->
<div class="w-full max-w-[600px] flex gap-gutter mt-section-gap">
<button class="flex-1 h-[56px] rounded-lg bg-error-container text-on-error-container flex items-center justify-center gap-base font-label-md text-label-md hover:scale-[0.98] transition-transform cursor-pointer">
<span class="material-symbols-outlined" data-icon="thumb_down">thumb_down</span>
                No lo sabía
            </button>
<button class="flex-1 h-[56px] rounded-lg bg-secondary-container text-on-secondary-container flex items-center justify-center gap-base font-label-md text-label-md hover:scale-[0.98] transition-transform cursor-pointer">
<span class="material-symbols-outlined" data-icon="thumb_up">thumb_up</span>
                Lo sabía
            </button>
</div>
</main>
</body></html>
